# =============================================================================
# NEX Automat — Module Registry (Single Source of Truth)
# =============================================================================
# This file defines ALL business and system modules for the NEX Manager
# platform. Backend uses it for dynamic router registration and the
# /api/system/modules endpoint. Frontend consumes the endpoint.
#
# Status values:
#   active  — fully implemented, router exists, shown in sidebar
#   planned — not yet implemented, shown only in admin/planning views
#
# Roles: ri = read, ha = edit (handle), shu = admin (schvalovatel)
# =============================================================================

