name: CI Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format
    runs-on: [self-hosted, ANDROS]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy packages/ apps/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: [self-hosted, ANDROS]
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/unit/ -v --tb=short
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: [self-hosted, ANDROS]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit

      - name: Bandit scan
        shell: bash
        run: bandit -r packages/ apps/ -ll -x "*/tests/*" || true

  build:
    name: Docker Build
    runs-on: [self-hosted, ANDROS]
    needs: [lint, test]
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.nex-brain
            image: nex-brain
          - dockerfile: Dockerfile.telegram
            image: nex-telegram
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=$SHA_SHORT" >> $GITHUB_OUTPUT
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "latest_tag=stable" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: |
            ${{ matrix.image }}:${{ steps.tags.outputs.sha_tag }}
            ${{ matrix.image }}:${{ steps.tags.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image build summary
        run: |
          echo "### Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ matrix.image }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfile | ${{ matrix.dockerfile }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA Tag | ${{ steps.tags.outputs.sha_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest Tag | ${{ steps.tags.outputs.latest_tag }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Electron Build
  # ===========================================
  build-electron:
    needs: [lint, test]
    runs-on: [self-hosted, ANDROS-WIN]
    if: github.event_name == 'push'
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      CSC_LINK: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apps/frontend/nex-manager
        shell: pwsh
        run: npm ci

      - name: Build with electron-vite
        working-directory: apps/frontend/nex-manager
        shell: pwsh
        run: npm run build

      - name: Package Electron app (portable)
        working-directory: apps/frontend/nex-manager
        shell: pwsh
        run: npx electron-builder --win --x64 --dir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nex-manager-electron
          path: apps/frontend/nex-manager/dist/win-unpacked/
          if-no-files-found: error
          retention-days: 7

  # ===========================================
  # Staging Deploy Backend (DEPTEST) — Linux runner, Docker compose
  # ===========================================
  deploy-staging-backend:
    name: Deploy Backend to Staging (DEPTEST)
    needs: [lint, test, security, build, build-electron]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: [self-hosted, ANDROS]
    environment: staging-DEPTEST
    timeout-minutes: 15

    steps:
      - name: Deploy DEPTEST staging
        run: |
          cd /opt/nex-automat-src
          git pull origin develop
          docker compose -f /opt/nex-automat-src/deployment/docker/docker-compose.deptest.yml --env-file /opt/nex-automat-src/deployment/docker/.env.deptest up -d

      - name: Health check
        run: |
          sleep 15
          unhealthy=$(docker compose -f /opt/nex-automat-src/deployment/docker/docker-compose.deptest.yml --env-file /opt/nex-automat-src/deployment/docker/.env.deptest ps --status running --format "{{.Name}}" | wc -l)
          total=$(docker compose -f /opt/nex-automat-src/deployment/docker/docker-compose.deptest.yml --env-file /opt/nex-automat-src/deployment/docker/.env.deptest ps --format "{{.Name}}" | wc -l)
          echo "Running: $unhealthy / Total: $total"
          if [ "$unhealthy" -eq "$total" ] && [ "$total" -gt 0 ]; then
            echo "✅ All $total DEPTEST containers running"
          else
            docker compose -f /opt/nex-automat-src/deployment/docker/docker-compose.deptest.yml --env-file /opt/nex-automat-src/deployment/docker/.env.deptest ps
            docker compose -f /opt/nex-automat-src/deployment/docker/docker-compose.deptest.yml --env-file /opt/nex-automat-src/deployment/docker/.env.deptest logs --tail=20
            echo "❌ DEPTEST health check failed"
            exit 1
          fi

  # ===========================================
  # Staging Deploy Electron (DEPTEST) — Windows runner
  # ===========================================
  deploy-staging-electron:
    name: Deploy Electron to Staging (DEPTEST)
    needs: [build-electron]
    runs-on: [self-hosted, ANDROS-WIN]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Download Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: nex-manager-electron
          path: electron-app

      - name: Stop NEX Manager before deploy
        shell: cmd
        run: |
          echo === Stopping NEX Manager processes ===
          taskkill /F /IM "NEX Manager.exe" 2>nul
          taskkill /F /IM "nex-manager.exe" 2>nul
          taskkill /F /IM "electron.exe" 2>nul
          echo Waiting for file locks to release...
          timeout /t 5 /nobreak >nul
          echo === Process cleanup complete ===
          exit /b 0

      - name: Verify app.asar is not locked
        shell: pwsh
        run: |
          $asarPath = "C:\DEPTEST\nex-manager\resources\app.asar"

          if (Test-Path $asarPath) {
            $maxRetries = 10
            $retry = 0
            while ($retry -lt $maxRetries) {
              try {
                $stream = [IO.File]::Open($asarPath, 'Open', 'ReadWrite', 'None')
                $stream.Close()
                Write-Host "File is accessible (attempt $($retry + 1))"
                break
              } catch {
                $retry++
                Write-Host "File still locked (attempt $retry/$maxRetries), waiting..."
                if ($retry -le 3) {
                  # Try killing again via WMI (can kill cross-session)
                  Get-WmiObject Win32_Process | Where-Object { $_.Name -match 'electron|NEX Manager|nex-manager' } | ForEach-Object {
                    Write-Host "WMI killing: $($_.Name) PID=$($_.ProcessId)"
                    $_.Terminate() | Out-Null
                  }
                }
                Start-Sleep -Seconds 3
              }
            }
            if ($retry -eq $maxRetries) {
              Write-Host "WARNING: File may still be locked after $maxRetries retries"
              Get-Process | Where-Object { $_.Path -like "*electron*" -or $_.Path -like "*nex*" } | Format-Table Name, Id, Path
            }
          } else {
            Write-Host "app.asar does not exist yet — fresh deploy, no lock issue"
          }

      - name: Deploy to DEPTEST
        shell: pwsh
        run: |
          $target = "C:\DEPTEST\nex-manager"

          # Try clean removal with retry
          if (Test-Path $target) {
            $maxRetries = 3
            $retry = 0
            $removed = $false
            while ($retry -lt $maxRetries -and -not $removed) {
              try {
                Remove-Item -Path $target -Recurse -Force -ErrorAction Stop
                $removed = $true
                Write-Host "Old deployment removed successfully"
              } catch {
                $retry++
                Write-Host "Remove failed (attempt $retry/$maxRetries): $($_.Exception.Message)"
                if ($retry -lt $maxRetries) {
                  # Nuclear option: use cmd rmdir which handles locks differently
                  Write-Host "Trying cmd /c rmdir..."
                  cmd /c "rmdir /s /q `"$target`"" 2>&1 | Out-Null
                  if (-not (Test-Path $target)) {
                    $removed = $true
                    Write-Host "cmd rmdir succeeded"
                  } else {
                    Start-Sleep -Seconds 3
                  }
                }
              }
            }
            if (-not $removed) {
              Write-Host "ERROR: Could not remove old deployment after $maxRetries retries"
              Write-Host "Attempting deploy over existing files..."
            }
          }

          # Copy new build (force overwrite)
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          Copy-Item -Path "electron-app\*" -Destination $target -Recurse -Force

          # Verify
          $exe = Get-ChildItem -Path $target -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Write-Host "Deployed: $($exe.FullName) ($([math]::Round($exe.Length/1MB, 1)) MB)"
          } else {
            Write-Error "No .exe found in $target"
            exit 1
          }

      - name: Create DEPTEST config
        shell: pwsh
        run: |
          $configDir = "C:\DEPTEST\nex-manager\resources"
          New-Item -ItemType Directory -Path $configDir -Force | Out-Null
          @{apiUrl = "http://100.107.134.104:9110"} | ConvertTo-Json | Set-Content "$configDir\config.json"
          Write-Host "DEPTEST config written to $configDir\config.json"
          Get-Content "$configDir\config.json"

      - name: Start NEX Manager after deploy
        shell: pwsh
        run: |
          $exePath = "C:\DEPTEST\nex-manager\NEX Manager.exe"
          if (Test-Path $exePath) {
            Write-Host "Starting NEX Manager..."
            Start-Process -FilePath $exePath -WindowStyle Hidden
            Start-Sleep -Seconds 2
            $running = Get-Process -Name "NEX Manager" -ErrorAction SilentlyContinue
            if ($running) {
              Write-Host "NEX Manager started successfully (PID: $($running.Id))"
            } else {
              Write-Host "WARNING: NEX Manager did not start"
            }
          } else {
            Write-Host "NEX Manager.exe not found at $exePath — skipping auto-start"
          }
